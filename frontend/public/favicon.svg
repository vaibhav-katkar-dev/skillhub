<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
  </defs>

  <!-- Blue rounded square background -->
  <rect width="40" height="40" rx="10" fill="url(#bgGrad)"/>

  <!-- Subtle inner highlight -->
  <rect x="1" y="1" width="38" height="19" rx="9" fill="white" fill-opacity="0.06"/>

  <!-- Trend line -->
  <path d="M 8 28 C 13 21, 17 25, 32 10" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Arrow head -->
  <path d="M 23.5 10 L 32 10 L 32 18.5" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Dot at trend line start -->
  <circle cx="8" cy="28" r="2" fill="white" fill-opacity="0.7"/>
</svg>