<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle — white fill so it looks clean on any browser tab -->
  <circle cx="32" cy="32" r="31" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Ring -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="#374151" stroke-width="4"/>

  <!-- Rising bars clipped inside ring -->
  <clipPath id="fav-clip">
    <circle cx="32" cy="32" r="21"/>
  </clipPath>
  <g clip-path="url(#fav-clip)">
    <rect x="12" y="38" width="6" height="10" rx="1.5" fill="#1D4ED8"/>
    <rect x="21" y="32" width="6" height="16" rx="1.5" fill="#2563EB"/>
    <rect x="30" y="26" width="6" height="22" rx="1.5" fill="#3B82F6"/>
    <rect x="39" y="20" width="6" height="28" rx="1.5" fill="#2563EB"/>
  </g>

  <!-- Baseline -->
  <line x1="10" y1="50" x2="54" y2="50" stroke="#374151" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Green tick badge top-right -->
  <circle cx="48" cy="16" r="10" fill="#16A34A"/>
  <path d="M 43 15.5 L 47 20 L 54 10" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>