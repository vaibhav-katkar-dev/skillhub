<svg width="520" height="180" viewBox="0 0 520 180" xmlns="http://www.w3.org/2000/svg" aria-label="SkillValix">
  <defs>
    <radialGradient id="circleGrad" cx="32%" cy="28%" r="75%">
      <stop offset="0%" stop-color="#93C5FD" />
      <stop offset="40%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#1E3A8A" />
    </radialGradient>

    <radialGradient id="rimGrad" cx="35%" cy="30%" r="65%">
      <stop offset="60%" stop-color="white" stop-opacity="0" />
      <stop offset="100%" stop-color="white" stop-opacity="0.12" />
    </radialGradient>

    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22C55E" />
      <stop offset="100%" stop-color="#15803D" />
    </linearGradient>

    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#1F2937" />
    </linearGradient>

    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>

    <filter id="circleShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#1E3A8A" flood-opacity="0.35" />
    </filter>
    <filter id="badgeShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#166534" flood-opacity="0.4" />
