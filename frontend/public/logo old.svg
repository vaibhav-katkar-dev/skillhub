  <text x="152" y="115" font-family="DM Sans, Segoe UI, system-ui, sans-serif" font-size="70" font-weight="900" letter-spacing="-2.5" filter="url(#textShadow)">
    <tspan fill="url(#textGrad)">Skill</tspan>
    <tspan fill="url(#blueGrad)">valix</tspan>
